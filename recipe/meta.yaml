{% set name = "p2j" %}
{% set version = "1.3.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/p2j-{{ version }}.tar.gz
  sha256: 6a492350953a87ceaf190b13141242f604b597efd668c2b026241c4a4f4777f5

build:
  entry_points:
    - p2j=p2j.p2j:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}

test:
  imports:
    - p2j
  commands:
    - pip check
    - p2j --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/raibosome/python2jupyter
  summary: 'p2j: Convert Python scripts to Jupyter notebook with minimal intervention'
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - cshaley
